<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>きもちチェック</title>
</head>
<body>
<style>
@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic&display=swap');

:root {
  /* ── フェード ── */
  --fade-ms:      500;   /* 画面切り替えのフェード時間（ミリ秒） */
  --fade-wait-ms: 200;   /* 選択肢を押してから次へ行くまでの待ち時間（ミリ秒） */

  /* ── バブルの円の半径（0.0〜0.5 が目安。大きいほど外側に広がる） ── */
  --bubble-rw: 0.25;     /* 横方向の半径（画面幅に対する割合） */
  --bubble-rh: 0.35;     /* 縦方向の半径（バブルエリア高さに対する割合） */

  /* ── 結果画面のサイズ ── */

  --res-ttl-size:    35px;  /* きもちタイトルの文字サイズ */
  --res-desc-size:   20px;  /* きもちの説明文の文字サイズ */
  --center-img-size: 150px;  /* 中央カードの画像サイズ */
  --center-txt-size: 30px;  /* 中央カードのラベル文字サイズ */
  --bubble-w:       250px;  /* バブルの横幅 */
  --bubble-txt:      15px;  /* バブルの文字サイズ */
  --bubble-img-size: 200px;   /* バブルの画像サイズ */

  /* ── 太字の設定（400=ふつう / 700=太字） ── */
  --fw-q-text:    700;   /* 質問文の太さ */
  --fw-opt-label: 700;   /* 選択肢のラベルの太さ */
  --fw-res-ttl:   700;   /* 結果タイトルの太さ */
  --fw-res-desc:  700;   /* 結果の説明文の太さ */
  --fw-bubble:    700;   /* 特効薬バブルの文字の太さ */
}

/* ============================================== */

*{box-sizing:border-box;margin:0;padding:0}

html, body {
  width:100%; height:100%;
  overflow:hidden;
  background-color: rgb(255,249,243);
}

#app {
  font-family:'M PLUS Rounded 1c',sans-serif;
  font-weight:700;
  width:100%; height:100%;
  display:flex; flex-direction:column;
  color:#53433a;
  overflow:hidden;
  position:relative;
}

.header-text {
  position:absolute; bottom:20px; right:40px;
  font-size:18px; color:#7e7d81;
  z-index:100; pointer-events:none;
  font-family:'Zen Maru Gothic',sans-serif;
}


.footer-text {
  position:absolute; bottom:20px; left:30px;
  font-size:16px; color:#7e7d81;
  z-index:100; pointer-events:none;
  font-family:'Zen Maru Gothic',sans-serif;
}

/* ── 画面共通：フェード ── */
.screen {
  display:none; width:100%; height:100%;
  flex-direction:column; align-items:center; justify-content:center;
  padding:20px;
  opacity:0;
  transition:opacity calc(var(--fade-ms) * 1ms) ease;
  overflow:hidden;
}
.screen.active  { display:flex; }
.screen.visible { opacity:1; }

/* ── スタート画面 ── */
#startScreen {
  justify-content: flex-start;
  padding-top: 115px; /* 上からの余白で調整 */
}
.big-img {width:250px; height:250px; object-fit:contain; margin-bottom:10px; display:block;} /* スタート画面のイラスト */
.ttl { font-size:35px; color:var(--color-text-secondary); text-align:center; line-height:1.2; margin-bottom:30px; }
.sub { font-size:25px; color:var(--color-text-secondary); text-align:center; line-height:1.2; margin-bottom:30px;   font-family:'Zen Maru Gothic',sans-serif;}
.start-btn { background:#ffce65; color:#fff; border:none; border-radius:99px; padding:30px 50px; font-size:30px; font-weight:500; cursor:pointer; }
.start-btn:active { transform:scale(0.96); }

/* ── 質問画面 ── */
#quizScreen {
  justify-content: flex-start;
  padding-top: 60px;
}
.pbar-wrap { width:100%; height:7px; background:var(--color-background-secondary); border-radius:99px; margin-bottom:16px; overflow:hidden; flex-shrink:0; }
.pbar { height:100%; border-radius:99px; background:#FFA726; transition:width .35s; }
.q-text { font-size:40px; font-weight:var(--fw-q-text); color:var(--color-text-primary); text-align:center; line-height:1.5; margin-bottom:16px; flex-shrink:0; }
.opts { display:grid; grid-template-columns:1fr 1fr; gap:15px; width:100%; max-width:600px; flex-shrink:0; margin: 0 auto; }
.opt  { background:#FFF3E0; border:1.5px solid #FFCC80; border-radius:16px; padding:11px 50px; font-size:20px; cursor:pointer; color:var(--color-text-primary); display:flex; flex-direction:column; align-items:center; gap:5px; transition:background .12s,border-color .12s; }
.opt .oi     { font-size:10px; line-height:1; min-height:50px; display:flex; align-items:center; justify-content:center; }
.opt .oi img { width:130px; height:130px; object-fit:contain; } /* 選択肢上のイラスト */
.opt .ol     { font-weight:var(--fw-opt-label); }
.opt:hover  { background:#FFE0B2; border-color:#FFA726; }
.opt.sel    { background:#FFE0B2; border-color:#FFA726; color:#72243E; }
.opt:active { transform:scale(0.95); }

/* ── もどるボタン ── */
.back-btn { align-self:center; margin-top:12px; background:transparent; border:none; font-size:18px; color:#bbbbbb; cursor:pointer; padding:4px 8px; flex-shrink:0; }
.back-btn:hover { color:#888; }
.back-btn:active { transform:scale(0.95); }
.back-btn.hidden { visibility:hidden; pointer-events:none; }

/* ── 結果画面 ── */
#resultScreen {
  padding:0; justify-content:flex-start; 
  justify-content: flex-start;
  padding-top: 30px;
}
.res-top  { text-align:center; padding:8px 16px 4px; flex-shrink:0; width:100%; }
.res-img  { width:var(--res-img-size); height:var(--res-img-size); object-fit:contain; margin:0 auto 3px; display:block;}
.res-ttl  { font-size:var(--res-ttl-size); font-weight:var(--fw-res-ttl); color:var(--color-text-primary); }
.res-desc { font-size:var(--res-desc-size); font-weight:var(--fw-res-desc); color:var(--color-text-secondary); margin-top:3px; line-height:1.5; }

.bubble-scene { position:relative; width:100%; flex:1; min-height:0; overflow:hidden; }

.center-card     { position:absolute; top:45%; left:50%; transform:translate(-50%,-50%); background:var(--color-background-primary); border:1px solid var(--color-border-secondary); border-radius:24px; padding:10px 20px; text-align:center; width:auto; min-width:120px; z-index:10; }
.center-card .ce { line-height:1; margin-bottom:4px; min-height:50px; display:flex; align-items:center; justify-content:center; }
.center-card .ce img { width:var(--center-img-size); height:var(--center-img-size); object-fit:contain; }
.center-card .ct { font-size:var(--center-txt-size); font-weight:700; color:var(--color-text-secondary); line-height:1.4; white-space:nowrap; }
.sub-tags { margin-top:8px; display:flex; flex-direction:column; gap:3px; color:#808080}
.sub-tag  { font-size:14px; color:#888; line-height:1.4; white-space:nowrap; }

.bubble { position:absolute; width:var(--bubble-w); border-radius:20px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; font-size:var(--bubble-txt); font-weight:var(--fw-bubble); line-height:1.4; padding:12px 10px 10px; opacity:0; transition:opacity 3.5s ease; gap:6px; }
.bubble-img { width:var(--bubble-img-size, 80px); height:var(--bubble-img-size, 80px); object-fit:contain; flex-shrink:0; }
.bubble-txt { line-height:1.4; }

.retry-btn { flex-shrink:0; margin:0 0 30px; background:var(--color-background-secondary); border:0.5px solid var(--color-border-secondary); border-radius:99px; padding:7px 22px; font-size:18px; color:var(--color-text-secondary); cursor:pointer; }

/* ── スマホ向け調整 (max-width: 480px) ── */
@media (max-width: 480px) {
  #startScreen { padding-top: 60px; }
  .big-img     { width: 180px; height: 180px; }
  .ttl         { font-size: 26px; margin-bottom: 16px; }
  .sub         { font-size: 18px; margin-bottom: 20px; }
  .start-btn   { font-size: 22px; padding: 20px 36px; }
  .footer-text { font-size: 8px; bottom: 12px; left: 16px; }
  .header-text { font-size: 13px; bottom: 12px; right: 16px; }

  #quizScreen  { padding-top: 36px; }
  .q-text      { font-size: 24px; margin-bottom: 10px; }
  .opts        { gap: 10px; max-width: 100%; }
  .opt         { padding: 8px 12px; font-size: 15px; }
  .opt .oi img { width: 90px; height: 90px; }
  .back-btn    { font-size: 15px; }

  #resultScreen { padding-top: 16px; }
  .res-ttl      { font-size: 20px; }
  .res-desc     { font-size: 10px; }
  .center-card .ct { font-size: 15px; }
  .sub-tags { font-size: 10px; }
  :root {
    --center-img-size: 90px;
    --center-txt-size: 18px;
    --bubble-w:        130px;
    --bubble-txt:      13px;

    --bubble-rw: 0.35;     /* 横方向の半径（画面幅に対する割合） */
    --bubble-rh: 0.34;     /* 縦方向の半径（バブルエリア高さに対する割合） */
  }

  .retry-btn { font-size: 13px; margin-bottom: 16px; }
}
</style>

<div id="app">

  <div class="ttl">きもちチェック</div>

<script>
const BASE_EXP  = "https://raw.githubusercontent.com/shogoochiai0421/YourEmo/main/images/expressions/";
const BASE_ACT  = "https://raw.githubusercontent.com/shogoochiai0421/YourEmo/main/images/acts/";
const IMG = {
  rainbow:        BASE_EXP+"main-rainbow.png",
  smile:          BASE_EXP+"expression-smile.png",
  cry:            BASE_EXP+"expression-cry.png",
  mad:            BASE_EXP+"expression-mad.png",
  puzzled:        BASE_EXP+"expression-puzzled.png",
  sad:            BASE_EXP+"expression-sad.png",
  normal:         BASE_EXP+"expression-normal.png",
  amaze:          BASE_EXP+"expression-amaze.png",
  kidding:        BASE_EXP+"expression-kidding.png",
  wink:           BASE_EXP+"expression-wink.png",
  enjoy:          BASE_EXP+"expression-enjoy.png",
  expressionless: BASE_EXP+"expression-expressionless.png",
  fear:           BASE_EXP+"expression-fear.png",
  notfeelingwell: BASE_EXP+"expression-notfeelingwell.png",
  panic:          BASE_EXP+"expression-panic.png",
  sickness:       BASE_EXP+"expression-sickness.png",
  sleepy:         BASE_EXP+"expression-sleepy.png",
  tired:          BASE_EXP+"expression-tired.png",
  playwith:       BASE_EXP+"expression-playwith.png",
  alone:          BASE_EXP+"expression-alone.png",
};

const Qs=[
  {id:"mood",text:"いまのきもちはどれかな？",opts:[
    {i:"😄",ikey:"smile",  l:"たのしいきもち",    v:"happy"},
    {i:"😢",ikey:"cry",    l:"かなしいきもち",    v:"sad"},
    {i:"😠",ikey:"mad",    l:"もやもやするきもち",v:"angry"},
    {i:"😨",ikey:"fear",   l:"なんだかこわいきもち",v:"anxious"}
  ]},
  {id:"energy",text:"からだにげんきはあるかな？",opts:[
    {i:"🔥",ikey:"enjoy",         l:"げんきいっぱい",v:"high"},
    {i:"😴",ikey:"tired",         l:"つかれたな",   v:"low"},
    {i:"🤒",ikey:"notfeelingwell",l:"ぐったり…",   v:"verylow"},
    {i:"😐",ikey:"expressionless",l:"ふつうかな",   v:"mid"},
  ]},
  {id:"social",text:"だれかといたいきもちはある？",opts:[
    {i:"🤗",ikey:"playwith",     l:"いっしょにいたい",v:"social"},
    {i:"🏠",ikey:"alone",     l:"ひとりがいいな", v:"alone"},
    {i:"🙂",ikey:"wink", l:"どちらでも",     v:"neutral"},
    {i:"😶",ikey:"expressionless",     l:"わからない",     v:"unsure"}
  ]},
  {id:"body",text:"からだはどんなかんじ？",opts:[
    {i:"💓",    ikey:"panic",   l:"ドキドキしてる", v:"heart"},
    {i:"😮‍💨",ikey:"amaze",   l:"いきぐるしい",  v:"breath"},
    {i:"🤢",    ikey:"sickness",l:"きもちわるい<br>あたまがいたい",v:"bad"},
    {i:"😌",    ikey:"smile",  l:"だいじょうぶ",  v:"fine"}
  ]},
  {id:"wish",text:"いましたいことは？",opts:[
    {i:"😴",ikey:"sleepy",  l:"ねむりたい",     v:"sleep"},
    {i:"🎮",ikey:"playwith",   l:"あそびたい",     v:"play"},
    {i:"🤝",ikey:"kidding", l:"はなしたい",     v:"talk"},
    {i:"😶",ikey:"expressionless", l:"なにもしたくない",v:"nothing"}
  ]}
];


/* 配列からランダムに1つ選んで返す *//* 回答とバブルのタグを照合してスコアを計算する。
   各タグは文字列または配列で複数指定可能。
   "any" はスコアに加算しない（除外しないだけ）。
   回答値と一致したタグ1つにつき +1点。重みは 2^score。 */
function matchTag(tag, val){
  if(!tag || tag === "any") return false;        /* any は加点しない */
  if(Array.isArray(tag)) return tag.includes(val); /* 配列なら includes で判定 */
  return tag === val;
}
function scoreBubble(bubble, ans){
  let score = 0;
  const tags = bubble.tags;
  if(matchTag(tags.mood,   ans.mood))   score++;
  if(matchTag(tags.energy, ans.energy)) score++;
  if(matchTag(tags.social, ans.social)) score++;
  if(matchTag(tags.body,   ans.body))   score++;
  if(matchTag(tags.wish,   ans.wish))   score++;
  return score;
}

/* スコアに基づく重み付きランダム選択でN個を返す */
function selectBubbles(ans, n){
  const scored = BUBBLES.map(b => ({b, w: Math.pow(2, scoreBubble(b, ans))}));
  const result = [];
  const used = new Set();
  for(let i = 0; i < n && used.size < BUBBLES.length; i++){
    const total = scored.reduce((s, x, idx) => used.has(idx) ? s : s + x.w, 0);
    let r = Math.random() * total;
    for(let j = 0; j < scored.length; j++){
      if(used.has(j)) continue;
      r -= scored[j].w;
      if(r <= 0){ used.add(j); result.push(scored[j].b); break; }
    }
  }
  return result;
}

/* 配列からランダムに1つ選んで返す */
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
/* 配列をランダムにシャッフルして返す */
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
/* CSSカスタムプロパティ（:root変数）の値を数値で取得する */
function cssVar(name){return parseFloat(getComputedStyle(document.documentElement).getPropertyValue(name))||0;}

let cur=0,ans={},busy=false;

/* 指定した画面要素をフェードインで表示する */
function fadeIn(el){
  el.classList.add("active");
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add("visible")));
}
/* 指定した画面要素をフェードアウトし、完了後にコールバックを実行する */
function fadeOut(el,cb){
  el.classList.remove("visible");
  setTimeout(()=>{el.classList.remove("active");if(cb)cb();},cssVar('--fade-ms')||300);
}
/* 質問画面のコンテンツだけをふわっと切り替える（画面全体ではなく中身のみ） */
function fadeContent(cb){
  const qs=document.getElementById("quizScreen");
  const ms=(cssVar('--fade-ms')||300)*0.6;
  qs.style.transition=`opacity ${ms}ms ease`;
  qs.style.opacity="0";
  setTimeout(()=>{cb();qs.style.opacity="1";setTimeout(()=>{qs.style.transition="";},ms+50);},ms);
}

/* ページ読み込み完了時：スタート画面の画像をセットしてフェードイン */
window.addEventListener("load",()=>{
  const si=document.getElementById("startImg");
  if(IMG.rainbow){si.src=IMG.rainbow;si.style.display="block";}else{si.style.display="none";}
  fadeIn(document.getElementById("startScreen"));
});

/* はじめるボタンを押したとき：スタート画面をフェードアウトして質問画面へ */
function startQ(){
  fadeOut(document.getElementById("startScreen"),()=>{
    cur=0;ans={};renderQ();
    fadeIn(document.getElementById("quizScreen"));
  });
}

/* 現在の質問（cur番目）を画面に描画する。もどるボタンの表示も更新する */
function renderQ(){
  busy=false;
  const q=Qs[cur];
  document.getElementById("pbar").style.width=(cur/Qs.length*100)+"%";
  document.getElementById("qtext").textContent=q.text;
  /* もどるボタン：最初の質問では隠す */
  const backBtn=document.getElementById("backBtn");
  if(cur===0){ backBtn.classList.add("hidden"); }else{ backBtn.classList.remove("hidden"); }
  /* さいしょにもどるボタン：最初の質問のみ表示 */
  const topBtn=document.getElementById("topBtn");
  if(cur===0){ topBtn.classList.remove("hidden"); }else{ topBtn.classList.add("hidden"); }
  const g=document.getElementById("opts");
  g.innerHTML="";
  q.opts.forEach(o=>{
    const b=document.createElement("button");
    b.className="opt";
    let iconHtml;
    if(o.ikey&&IMG[o.ikey]){
      iconHtml=`<span class="oi"><img src="${IMG[o.ikey]}" width="30" height="30" style="object-fit:contain"></span>`;
    }else if(o.i){
      iconHtml=`<span class="oi" style="font-size:26px">${o.i}</span>`;
    }else{
      iconHtml=`<span class="oi"></span>`;
    }
    b.innerHTML=iconHtml+`<span class="ol">${o.l}</span>`;
    b.onclick=()=>selectOpt(o.v,b);
    g.appendChild(b);
  });
}

/* 一つ前の質問に戻る。そのときに記録した回答も消す */
function goBack(){
  if(cur<=0||busy)return;
  delete ans[Qs[cur-1].id];
  cur--;
  fadeContent(()=>renderQ());
}

/* さいしょにもどるボタン：スタート画面に戻る */
function goTop(){
  fadeOut(document.getElementById("quizScreen"),()=>{
    cur=0;ans={};
    fadeIn(document.getElementById("startScreen"));
  });
}

/* 選択肢が押されたとき：回答を記録し、次の質問または結果画面へ進む */
function selectOpt(val,btn){
  if(busy)return;
  busy=true;
  ans[Qs[cur].id]=val;
  document.querySelectorAll(".opt").forEach(x=>x.classList.remove("sel"));
  btn.classList.add("sel");
  const wait=cssVar('--fade-wait-ms')||320;
  setTimeout(()=>{
    cur++;
    if(cur>=Qs.length){
      fadeOut(document.getElementById("quizScreen"),()=>showResult());
    }else{
      fadeContent(()=>renderQ());
    }
  },wait);
}

/* 結果画面を構築して表示する */
function showResult(){
  const mt=ans.mood||"neutral";
  const d=MD[mt]||MD.neutral;
  /* 結果画面トップの画像は表示しない */
  document.getElementById("resicon").innerHTML="";
  document.getElementById("rttl").textContent=pick(d.ttls);
  document.getElementById("rdesc").textContent=pick(d.descs);
  const cce=document.getElementById("cce");
  if(d.ce_ikey&&IMG[d.ce_ikey]){
    cce.innerHTML=`<img src="${IMG[d.ce_ikey]}" style="width:var(--center-img-size);height:var(--center-img-size);object-fit:contain">`;
  }else{
    cce.innerHTML="";
  }
  document.getElementById("cct").textContent=d.ct;

  /* 各回答値に対応する表示用の要約テキスト ← ここを編集してね */
  const ANS_LABEL = {
    energy: { high:"げんきいっぱい", mid:"げんきはふつう", low:"つかれている", verylow:"ぐったり" },
    social: { social:"だれかといたい", alone:"ひとりでいたい", neutral:"ひとりでもみんなでも", unsure:"どうしてたいかわからない" },
    body:   { heart:"むねがどきどきしてる", breath:"いきぐるしい", bad:"たいちょうがわるい", fine:"からだはへいき" },
    wish:   { sleep:"ねむりたい", play:"あそびたい", talk:"だれかとはなしたい", nothing:"なにもしたくない" },
  };
  /* 4つの要約を「、」でつなげて1行で表示 */
  const subTagsEl = document.getElementById("subTags");
  const subIds = ["energy","social","body","wish"];
  const parts = subIds.map(id => {
    if(!ans[id]) return "";
    return (ANS_LABEL[id] && ANS_LABEL[id][ans[id]]) || "";
  }).filter(s => s !== "");
  subTagsEl.textContent = parts.join("・");
  /* 全特効薬を回答との一致度でスコアリングして重み付き選択 */
  const chosen = selectBubbles(ans, 10);
  fadeIn(document.getElementById("resultScreen"));
  setTimeout(()=>placeBubbles(chosen),(cssVar('--fade-ms')||300)+50);
}

/* 特効薬バブルを円周上に配置して結果画面に追加する。
   中心座標はバブルエリア(bscene)の cx=W/2, cy=H/2 で決まる */
function placeBubbles(list){
  const scene=document.getElementById("bscene");
  scene.querySelectorAll(".bubble").forEach(b=>b.remove());
  const W=scene.offsetWidth||500;
  const H=scene.offsetHeight||300;
  const cx=W/2, cy=H/2.3;
  const n=list.length;
  const rwRatio=cssVar('--bubble-rw')||0.42;
  const rhRatio=cssVar('--bubble-rh')||0.43;
  const bwStr=getComputedStyle(document.documentElement).getPropertyValue('--bubble-w').trim();
  const bw=parseInt(bwStr)||115;
  const bh=50;
  const rW=Math.min(cx-bw/2-4, W*rwRatio);
  const rH=Math.min(cy-bh/2-4, H*rhRatio);

  /* 出現タイミングをシャッフルして円周の位置とフェードイン順を切り離す */
  const INTERVAL = 1000; /* 全バブルが出そろうまでの合計時間(ms) ← ここで調整 */
  const slots = list.map((_,i)=>i);
  for(let k=slots.length-1;k>0;k--){const j=Math.floor(Math.random()*(k+1));[slots[k],slots[j]]=[slots[j],slots[k]];}

  list.forEach((item,i)=>{
    const angle=(2*Math.PI/n)*i-Math.PI/2;
    const bx=cx+rW*Math.cos(angle);
    const by=cy+rH*Math.sin(angle);
    const el=document.createElement("div");
    el.className="bubble";
    const bc = item.g && BC[item.g] ? BC[item.g] : {c:item.c||"#FBEAF0", tc:item.tc||"#72243E"};
    /* item.img が指定されていれば acts フォルダの画像を表示、なければ画像なしでテキストのみ */
    const imgHtml = item.img
      ? `<img class="bubble-img" src="${BASE_ACT}${item.img}" alt="">`
      : "";
    el.innerHTML = imgHtml + `<span class="bubble-txt">${item.t}</span>`;
    el.style.cssText=`left:${(bx-bw/2).toFixed(0)}px;top:${(by-bh/2).toFixed(0)}px;background:${bc.c};color:${bc.tc};`;
    scene.appendChild(el);
    /* slots[i] 番目のタイミングでフェードイン（ランダムなぶれも少し加える） */
    const delay = (slots[i] / n) * INTERVAL + Math.random() * 100;
    setTimeout(()=>{ requestAnimationFrame(()=>requestAnimationFrame(()=>{ el.style.opacity="1"; })); }, delay);
  });
}

/* もう一どやるボタンを押したとき：結果画面をリセットしてスタート画面へ戻る */
function restart(){
  /* バブル・テキスト・サブタグを即座にリセット */
  document.getElementById("bscene").querySelectorAll(".bubble").forEach(b=>b.remove());
  document.getElementById("rttl").textContent="";
  document.getElementById("rdesc").textContent="";
  document.getElementById("cce").innerHTML="";
  document.getElementById("cct").textContent="";
  document.getElementById("subTags").textContent="";
  fadeOut(document.getElementById("resultScreen"),()=>{
    cur=0;ans={};
    fadeIn(document.getElementById("startScreen"));
  });
}
</script>
